<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../components/dark-mode-toggle.js"></script>
  <title>Chat Sidebar — Context Menu</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../components/Button/Button.css">
  <link rel="stylesheet" href="ChatSidebar.css">
</head>
<body>

<div class="chat-layout">

  <!-- Header -->
  <header class="chat-header">
    <div class="chat-header__left">
      <span class="chat-header__logo">Affino</span>
      <button class="chat-header__dropdown" type="button">
        Support Assistant
        <i data-lucide="chevron-down" aria-hidden="true"></i>
      </button>
    </div>
    <div class="chat-header__right">
      <button class="btn btn--tertiary btn--icon" aria-label="Bug report" type="button">
        <i data-lucide="bug" aria-hidden="true"></i>
      </button>
      <button class="btn btn--tertiary btn--icon" aria-label="Database" type="button">
        <i data-lucide="database-zap" aria-hidden="true"></i>
      </button>
      <button class="btn btn--tertiary btn--sm" type="button">Style</button>
      <button class="btn btn--tertiary btn--sm" type="button">System Role</button>
      <button class="btn btn--tertiary btn--icon" aria-label="Maximise" type="button">
        <i data-lucide="maximize-2" aria-hidden="true"></i>
      </button>
      <button class="btn btn--tertiary btn--icon" aria-label="Close" type="button">
        <i data-lucide="x" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <!-- Body -->
  <div class="chat-body">

    <!-- Sidebar -->
    <aside class="chat-sidebar" aria-label="Chat history">

      <button class="btn btn--secondary btn--sm chat-sidebar__new-btn" type="button">
        <i data-lucide="plus" aria-hidden="true"></i>
        New Chat
      </button>

      <nav class="chat-list" aria-label="Conversations">

        <span class="chat-list__group-label">Today</span>

        <div class="chat-row chat-row--selected" role="button" tabindex="0" aria-current="true">
          <span class="chat-row__label">Design System Components</span>
          <span class="chat-row__fade" aria-hidden="true"></span>
          <button class="chat-row__menu-btn" aria-label="More options for Design System Components" type="button">
            <i data-lucide="ellipsis" aria-hidden="true"></i>
          </button>
        </div>

        <!-- Hover state + context menu trigger on this row -->
        <div class="chat-row chat-row--hover" role="button" tabindex="0" data-context-open>
          <span class="chat-row__label">Registration Flow</span>
          <span class="chat-row__fade" aria-hidden="true"></span>
          <button class="chat-row__menu-btn is-active" aria-label="More options for Registration Flow" type="button">
            <i data-lucide="ellipsis" aria-hidden="true"></i>
          </button>
        </div>

        <div class="chat-row" role="button" tabindex="0">
          <span class="chat-row__label">Token Architecture Review</span>
          <span class="chat-row__fade" aria-hidden="true"></span>
          <button class="chat-row__menu-btn" aria-label="More options for Token Architecture Review" type="button">
            <i data-lucide="ellipsis" aria-hidden="true"></i>
          </button>
        </div>

        <div class="chat-row" role="button" tabindex="0">
          <span class="chat-row__label">Header Mobile Variants</span>
          <span class="chat-row__fade" aria-hidden="true"></span>
          <button class="chat-row__menu-btn" aria-label="More options for Header Mobile Variants" type="button">
            <i data-lucide="ellipsis" aria-hidden="true"></i>
          </button>
        </div>

        <span class="chat-list__group-label">Yesterday</span>

        <div class="chat-row" role="button" tabindex="0">
          <span class="chat-row__label">Color Palette Discussion</span>
          <span class="chat-row__fade" aria-hidden="true"></span>
          <button class="chat-row__menu-btn" aria-label="More options for Color Palette Discussion" type="button">
            <i data-lucide="ellipsis" aria-hidden="true"></i>
          </button>
        </div>

        <div class="chat-row" role="button" tabindex="0">
          <span class="chat-row__label">Button States Audit</span>
          <span class="chat-row__fade" aria-hidden="true"></span>
          <button class="chat-row__menu-btn" aria-label="More options for Button States Audit" type="button">
            <i data-lucide="ellipsis" aria-hidden="true"></i>
          </button>
        </div>

        <div class="chat-row" role="button" tabindex="0">
          <span class="chat-row__label">Dark Mode Implementation</span>
          <span class="chat-row__fade" aria-hidden="true"></span>
          <button class="chat-row__menu-btn" aria-label="More options for Dark Mode Implementation" type="button">
            <i data-lucide="ellipsis" aria-hidden="true"></i>
          </button>
        </div>

      </nav>
    </aside>

    <!-- Main content placeholder -->
    <main class="chat-main">
      <div class="chat-main__icon">
        <i data-lucide="message-square" aria-hidden="true"></i>
      </div>
      <p class="chat-main__text">Select a conversation to continue</p>
    </main>

  </div>
</div>

<!-- Context menu (outside sidebar to avoid overflow clipping) -->
<div id="context-menu" class="context-menu" role="menu" aria-label="Chat options">
  <div class="context-menu__item" role="menuitem" tabindex="-1">
    <i data-lucide="copy" aria-hidden="true"></i>
    Copy Chat
  </div>
  <div class="context-menu__item" role="menuitem" tabindex="-1">
    <i data-lucide="link" aria-hidden="true"></i>
    Copy Link
  </div>
  <div class="context-menu__item context-menu__item--danger" role="menuitem" tabindex="-1">
    <i data-lucide="trash-2" aria-hidden="true"></i>
    Delete
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  lucide.createIcons();

  var contextMenu = document.getElementById('context-menu');
  var openRow = null;

  // Row click → select
  document.querySelectorAll('.chat-row').forEach(function(row) {
    row.addEventListener('click', function(e) {
      if (e.target.closest('.chat-row__menu-btn')) return;
      document.querySelectorAll('.chat-row').forEach(function(r) {
        r.classList.remove('chat-row--selected');
      });
      row.classList.add('chat-row--selected');
    });
  });

  // "..." button → open context menu
  document.querySelectorAll('.chat-row__menu-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var row = btn.closest('.chat-row');

      if (openRow && openRow !== row) {
        openRow.classList.remove('chat-row--hover');
        var prevBtn = openRow.querySelector('.chat-row__menu-btn');
        if (prevBtn) prevBtn.classList.remove('is-active');
      }

      openRow = row;
      row.classList.add('chat-row--hover');
      btn.classList.add('is-active');

      var sidebarRect = document.querySelector('.chat-sidebar').getBoundingClientRect();
      var rowRect = row.getBoundingClientRect();
      contextMenu.style.left = (sidebarRect.right - 164) + 'px';
      contextMenu.style.top = (rowRect.bottom + 2) + 'px';
      contextMenu.classList.add('is-open');
    });
  });

  // Click outside → close context menu
  document.addEventListener('click', function() {
    contextMenu.classList.remove('is-open');
    if (openRow) {
      openRow.classList.remove('chat-row--hover');
      var btn = openRow.querySelector('.chat-row__menu-btn');
      if (btn) btn.classList.remove('is-active');
      openRow = null;
    }
  });

  // Auto-open context menu on the pre-hovered row (data-context-open)
  requestAnimationFrame(function() {
    var autoOpenRow = document.querySelector('[data-context-open]');
    if (autoOpenRow) {
      openRow = autoOpenRow;
      var sidebarRect = document.querySelector('.chat-sidebar').getBoundingClientRect();
      var rowRect = autoOpenRow.getBoundingClientRect();
      contextMenu.style.left = (sidebarRect.right - 164) + 'px';
      contextMenu.style.top = (rowRect.bottom + 2) + 'px';
      contextMenu.classList.add('is-open');
    }
  });
</script>
</body>
</html>
