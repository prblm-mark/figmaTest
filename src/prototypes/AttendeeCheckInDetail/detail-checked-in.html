<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../components/dark-mode-toggle.js"></script>
  <title>Attendee Check-in · Detail (Checked in)</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../components/Portraits/Portraits.css">
  <link rel="stylesheet" href="../../components/Avatar/Avatar.css">
  <link rel="stylesheet" href="../../components/Button/Button.css">
  <link rel="stylesheet" href="AttendeeCheckInDetail.css">
</head>
<body>

  <main class="attendee-phone" aria-labelledby="page-title">
    <header class="attendee-topbar">
      <button type="button" class="attendee-topbar__back" aria-label="Go to listing" onclick="location.href='detail-default.html'">
        <i data-lucide="arrow-left" aria-hidden="true"></i>
        <span>Go to listing</span>
      </button>
      <h1 id="page-title" class="attendee-topbar__title">Attendee Check-in</h1>
    </header>

    <section class="attendee-body">
      <div class="attendee-identity">
        <div class="avatar avatar--size-5">
          <img class="portrait" src="https://picsum.photos/seed/sarah-mitchell/300" alt="">
        </div>
        <h2 class="attendee-identity__name">Sarah Mitchell</h2>
      </div>

      <dl class="attendee-fields">
        <div class="attendee-field">
          <dt class="attendee-field__label">Email</dt>
          <dd class="attendee-field__value">sarah.mitchell@northwell.com</dd>
        </div>
        <div class="attendee-field">
          <dt class="attendee-field__label">Company</dt>
          <dd class="attendee-field__value">Northwell Publishing</dd>
        </div>
        <div class="attendee-field">
          <dt class="attendee-field__label">Business Phone</dt>
          <dd class="attendee-field__value">+44 20 7946 0123</dd>
        </div>
      </dl>
    </section>

    <div class="attendee-action">
      <div class="attendee-confirmed" role="status">
        <div class="attendee-confirmed__icon" aria-hidden="true">
          <i data-lucide="check"></i>
        </div>
        <div class="attendee-confirmed__text">
          <p class="attendee-confirmed__label">Checked in</p>
          <p class="attendee-confirmed__time">23 Apr 2026, 10:42:18</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
