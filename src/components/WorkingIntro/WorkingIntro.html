<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../dark-mode-toggle.js"></script>
  <title>WorkingIntro — Component Demo</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="WorkingIntro.css">
  <style>
    body {
      padding: var(--ai-spacing-7);
      background-color: var(--ai-surface-secondary);
      min-height: 100vh;
    }
    .demo-section {
      margin-bottom: var(--ai-spacing-7);
    }
    .demo-label {
      font-size: var(--ai-font-fixed-xs);
      font-weight: var(--ai-font-semibold);
      color: var(--ai-text-contrast);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--ai-spacing-5);
    }
    .demo-container {
      max-width: 480px;
      padding: var(--ai-spacing-6);
      background-color: var(--ai-surface-primary);
      border-radius: var(--ai-radius-lg);
    }
    .demo-controls {
      margin-top: var(--ai-spacing-5);
      display: flex;
      gap: var(--ai-spacing-3);
    }
    .demo-controls button {
      padding: var(--ai-spacing-2) var(--ai-spacing-4);
      border: 1px solid var(--ai-border-secondary);
      border-radius: var(--ai-radius-md);
      background: var(--ai-surface-primary);
      color: var(--ai-text-primary);
      cursor: pointer;
      font-family: var(--ai-font-body);
      font-size: var(--ai-font-fixed-xs);
    }
  </style>
</head>
<body data-surface="chat">
  <h1>WorkingIntro</h1>
  <p>Animated status indicator: brand avatar + title + subtitle cycling through 3 stages. Uses GSAP SplitText + ScrambleTextPlugin.</p>

  <div class="demo-section">
    <p class="demo-label">Animated (play / reset)</p>
    <div class="demo-container">
      <div class="working-intro" id="working-intro">
        <div class="working-intro__title-row">
          <div class="working-intro__logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 5.64227C22 3.07837 19.9972 1 17.5265 1C15.0558 1 13.053 3.07837 13.053 5.64227V10.0322L10.8036 6.12507C9.46186 3.79465 6.55383 3.03413 4.30787 4.42654C2.06218 5.81922 1.32958 8.8367 2.6711 11.1674C4.01262 13.4981 6.92066 14.2581 9.16687 12.8662L12.7851 10.6223L10.4552 14.8037C9.00004 17.4148 9.86 20.755 12.3765 22.2652C14.8929 23.7755 18.1117 22.8831 19.5672 20.2714C21.0222 17.6603 20.1624 14.3198 17.6457 12.8099L13.4383 10.2845H17.5262C19.9972 10.2845 22 8.2059 22 5.64227ZM8.49217 11.6936C6.87276 12.6977 4.76838 12.1472 3.80079 10.467C2.83346 8.78673 3.36344 6.60268 4.98284 5.59858C6.60225 4.59448 8.70663 5.145 9.67422 6.82523C10.6415 8.50546 10.1113 10.6895 8.49217 11.6936ZM16.9873 13.9915C18.8715 15.1223 19.518 17.6333 18.4286 19.5879C17.3389 21.5431 14.9193 22.2138 13.0354 21.0836C11.1513 19.9525 10.505 17.4418 11.5944 15.4872C12.6838 13.5314 15.1032 12.8605 16.9873 13.9915ZM14.3688 5.64227C14.3688 3.83534 15.7853 2.36537 17.5265 2.36537C19.2677 2.36537 20.6843 3.83534 20.6843 5.64227C20.6843 7.44921 19.2677 8.91917 17.5265 8.91917C15.7853 8.91917 14.3688 7.44893 14.3688 5.64227Z" fill="currentColor"/>
            </svg>
          </div>
          <h2 class="working-intro__title">Working on it</h2>
        </div>
        <p class="working-intro__subtitle">&nbsp;</p>
      </div>
      <div class="demo-controls">
        <button type="button" id="btn-play">Play</button>
        <button type="button" id="btn-reset">Reset</button>
      </div>
    </div>
  </div>

  <!-- GSAP CDN -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrambleTextPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>

  <script type="module">
    import { createWorkingIntroTimeline, destroyWorkingIntro } from './WorkingIntro.js';

    const el = document.getElementById('working-intro');
    const INITIAL_TITLE = 'Working on it';
    let tl = null;

    function reset() {
      if (tl) { destroyWorkingIntro(tl); tl = null; }
      el.querySelector('.working-intro__title').textContent = INITIAL_TITLE;
      el.querySelector('.working-intro__subtitle').innerHTML = '&nbsp;';
    }

    document.getElementById('btn-play').addEventListener('click', () => {
      reset();
      tl = createWorkingIntroTimeline(el);
    });

    document.getElementById('btn-reset').addEventListener('click', reset);

    // Auto-play on load
    tl = createWorkingIntroTimeline(el);
  </script>
</body>
</html>
