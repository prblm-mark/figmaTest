<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../dark-mode-toggle.js"></script>
  <title>Filter Dropdown Item Group — Design System</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../FilterDropdownItem/FilterDropdownItem.css">
  <link rel="stylesheet" href="FilterDropdownItemGroup.css">
  <style>
    body { padding: var(--ai-spacing-7); background: var(--ai-surface-secondary); min-height: 100vh; }
    h1 { font-size: var(--ai-font-fixed-4xl); font-weight: var(--ai-font-bold); color: var(--ai-text-primary); margin: 0 0 var(--ai-spacing-3); }
    .demo-intro { font-size: var(--ai-font-fixed-xs); color: var(--ai-text-secondary); margin: 0 0 var(--ai-spacing-7); max-width: 640px; }
    .demo-row { display: flex; flex-wrap: wrap; gap: var(--ai-spacing-7); align-items: flex-start; }
    .demo-item { display: flex; flex-direction: column; gap: var(--ai-spacing-3); }
    .demo-item__title { font-size: var(--ai-font-fixed-xxs); font-weight: var(--ai-font-semibold); color: var(--ai-text-contrast); text-transform: uppercase; letter-spacing: 0.08em; margin: 0; }
    /* Constrain each group to the Figma frame width for the gallery */
    .demo-group { width: 296px; }
  </style>
</head>
<body>

  <h1>Filter Dropdown Item Group</h1>
  <p class="demo-intro">
    A bordered card that stacks <a href="../FilterDropdownItem/FilterDropdownItem.html">FilterDropdownItem</a>
    rows. Two variants control whether the items show sub text. Selection is multi-select
    (click an item to toggle its check). Toggle dark mode to verify colour behaviour.
  </p>

  <div class="demo-row">

    <!-- Property 1 = w/Subtext -->
    <div class="demo-item">
      <p class="demo-item__title">w/Subtext</p>
      <div class="demo-group">
        <div class="filter-dropdown-item-group" role="listbox" aria-multiselectable="true" aria-label="Filter options with detail">
          <button type="button" class="filter-dropdown-item filter-dropdown-item--selected" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Selected option name</span>
              <span class="filter-dropdown-item__sub">Sub Text</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
              <span class="filter-dropdown-item__sub">Sub Text</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
              <span class="filter-dropdown-item__sub">Sub Text</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
              <span class="filter-dropdown-item__sub">Sub Text</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
              <span class="filter-dropdown-item__sub">Sub Text</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Property 1 = Default (no sub text) -->
    <div class="demo-item">
      <p class="demo-item__title">Default</p>
      <div class="demo-group">
        <div class="filter-dropdown-item-group" role="listbox" aria-multiselectable="true" aria-label="Filter options">
          <button type="button" class="filter-dropdown-item filter-dropdown-item--selected" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Selected option name</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
          <button type="button" class="filter-dropdown-item" data-filter-dropdown-item>
            <span class="filter-dropdown-item__text">
              <span class="filter-dropdown-item__name">Option name</span>
            </span>
            <span class="filter-dropdown-item__check"><i data-lucide="circle-check" aria-hidden="true"></i></span>
          </button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script src="../FilterDropdownItem/FilterDropdownItem.js"></script>
</body>
</html>
