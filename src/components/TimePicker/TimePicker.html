<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../dark-mode-toggle.js"></script>
  <title>TimePicker — Design System</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="TimePicker.css">
  <style>
    body {
      padding: var(--ai-spacing-7);
      background: var(--ai-surface-secondary);
      min-height: 100vh;
      max-width: 60rem;
      margin: 0 auto;
    }
    .demo-section {
      margin-bottom: var(--ai-spacing-9);
      background: var(--ai-surface-primary);
      padding: var(--ai-spacing-6);
      border-radius: var(--ai-radius-md);
    }
    .demo-section__title {
      font-size: var(--ai-font-fixed-xs);
      font-weight: var(--ai-font-semibold);
      color: var(--ai-text-contrast);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 var(--ai-spacing-5);
    }
    h1 {
      font-size: var(--ai-font-fixed-4xl);
      font-weight: var(--ai-font-bold);
      color: var(--ai-text-primary);
      margin: 0 0 var(--ai-spacing-7);
    }
  </style>
</head>
<body>

  <h1>TimePicker</h1>

  <!-- 1 · Single input -->
  <section class="demo-section">
    <p class="demo-section__title">Type=Single input</p>
    <div class="tp tp--single">
      <label class="tp__label" for="tp-single">Pick a time</label>
      <div class="tp__field">
        <span class="tp__icon"><i data-lucide="clock" aria-hidden="true"></i></span>
        <input id="tp-single" class="tp__control" type="text" value="11:30">
      </div>
    </div>
  </section>

  <!-- 2 · Duration -->
  <section class="demo-section">
    <p class="demo-section__title">Type=Duration</p>
    <div class="tp tp--segmented tp--duration">
      <div class="tp__field">
        <div class="tp__inner">
          <span class="tp__icon"><i data-lucide="clock" aria-hidden="true"></i></span>
          <input class="tp__control" type="text" value="11:30">
        </div>
        <button type="button" class="tp__dropdown">
          <span>1 hour</span>
          <i data-lucide="chevron-down" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </section>

  <!-- 3 · Timezone -->
  <section class="demo-section">
    <p class="demo-section__title">Type=Timezone</p>
    <div class="tp tp--segmented tp--timezone">
      <div class="tp__field">
        <div class="tp__inner">
          <span class="tp__icon"><i data-lucide="clock" aria-hidden="true"></i></span>
          <input class="tp__control" type="text" value="09:00">
        </div>
        <button type="button" class="tp__dropdown">
          <i data-lucide="globe" aria-hidden="true"></i>
          <span>Europe/London</span>
          <i data-lucide="chevron-down" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </section>

  <!-- 4 · Range -->
  <section class="demo-section">
    <p class="demo-section__title">Type=Range</p>
    <div class="tp-range">
      <div class="tp">
        <label class="tp__label" for="tp-start">Start</label>
        <div class="tp__field">
          <span class="tp__icon"><i data-lucide="clock" aria-hidden="true"></i></span>
          <input id="tp-start" class="tp__control" type="text" value="09:00">
        </div>
      </div>
      <div class="tp">
        <label class="tp__label" for="tp-end">End</label>
        <div class="tp__field">
          <span class="tp__icon"><i data-lucide="clock" aria-hidden="true"></i></span>
          <input id="tp-end" class="tp__control" type="text" value="17:30">
        </div>
      </div>
    </div>
  </section>

  <!-- 5 · Range reveal -->
  <section class="demo-section">
    <p class="demo-section__title">Type=Range Reveal</p>
    <div class="tp-reveal" id="reveal-demo">
      <div class="tp">
        <label class="tp__label" for="tp-rev-start">Time</label>
        <div class="tp__field">
          <span class="tp__icon"><i data-lucide="clock" aria-hidden="true"></i></span>
          <input id="tp-rev-start" class="tp__control" type="text" value="14:00">
        </div>
      </div>
      <button type="button" class="tp-reveal__add" data-tp-reveal>
        <i data-lucide="plus" aria-hidden="true"></i>
        <span>Add end time</span>
      </button>
      <div class="tp-reveal__second">
        <div class="tp">
          <label class="tp__label" for="tp-rev-end">End time</label>
          <div class="tp__field">
            <span class="tp__icon"><i data-lucide="clock" aria-hidden="true"></i></span>
            <input id="tp-rev-end" class="tp__control" type="text" value="15:00">
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 6 · Slots -->
  <section class="demo-section">
    <p class="demo-section__title">Type=Slots</p>
    <div class="tp-slots" role="radiogroup" aria-label="Available time slots">
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="09:00">
        <span class="tp-slot__label">09:00</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="09:30" disabled>
        <span class="tp-slot__label">09:30</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="10:00">
        <span class="tp-slot__label">10:00</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="10:30" checked>
        <span class="tp-slot__label">10:30</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="11:00">
        <span class="tp-slot__label">11:00</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="11:30">
        <span class="tp-slot__label">11:30</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="12:00">
        <span class="tp-slot__label">12:00</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="12:30" disabled>
        <span class="tp-slot__label">12:30</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="13:00">
        <span class="tp-slot__label">13:00</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="13:30">
        <span class="tp-slot__label">13:30</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="14:00">
        <span class="tp-slot__label">14:00</span>
      </label>
      <label class="tp-slot">
        <input type="radio" name="tp-slot" class="tp-slot__input" value="14:30">
        <span class="tp-slot__label">14:30</span>
      </label>
    </div>
  </section>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    lucide.createIcons();
    document.querySelectorAll('[data-tp-reveal]').forEach(btn => {
      btn.addEventListener('click', () => btn.closest('.tp-reveal').classList.add('tp-reveal--open'));
    });
  </script>
</body>
</html>
