<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../../components/dark-mode-toggle.js"></script>
  <title>Chart — Design System</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="Chart.css">
  <style>
    body {
      padding: var(--ai-spacing-7);
      background: var(--ai-surface-secondary);
      min-height: 100vh;
      max-width: 60rem;
      margin: 0 auto;
    }
    .demo-section {
      margin-bottom: var(--ai-spacing-9);
    }
    .demo-section__title {
      font-size: var(--ai-font-fixed-xs);
      font-weight: var(--ai-font-semibold);
      color: var(--ai-text-contrast);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 var(--ai-spacing-5);
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--ai-spacing-6);
    }
    h1 {
      font-size: var(--ai-font-fixed-4xl);
      font-weight: var(--ai-font-bold);
      color: var(--ai-text-primary);
      margin: 0 0 var(--ai-spacing-7);
    }
  </style>
</head>
<body>

  <h1>Chart</h1>

  <section class="demo-section">
    <p class="demo-section__title">Type=Multiple Lines · Single Line · Bar Chart · Doughnut</p>
    <div class="demo-grid">

      <!-- 1 · Multiple Lines -->
      <div class="chart">
        <div class="chart__head">
          <div class="chart__title">
            <p class="chart__big">42,389</p>
            <p class="chart__sub">Total clicks this month</p>
          </div>
          <span class="chart__delta">
            <i data-lucide="trending-up" aria-hidden="true"></i>
            <span>12.4%</span>
          </span>
        </div>
        <div class="chart__canvas"><canvas id="multi-line"></canvas></div>
        <div class="chart__foot">
          <button type="button" class="chart__filter">
            <span>Last 7 days</span>
            <i data-lucide="chevron-down" aria-hidden="true"></i>
          </button>
          <a href="#" class="chart__report-link">
            <span>Clicks Report</span>
            <i data-lucide="arrow-right" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <!-- 2 · Single Line -->
      <div class="chart">
        <div class="chart__head">
          <div class="chart__title">
            <p class="chart__big">£12,840</p>
            <p class="chart__sub">Revenue this quarter</p>
          </div>
          <span class="chart__delta">
            <i data-lucide="trending-up" aria-hidden="true"></i>
            <span>8.2%</span>
          </span>
        </div>
        <div class="chart__canvas"><canvas id="single-line"></canvas></div>
        <div class="chart__foot">
          <button type="button" class="chart__filter">
            <span>Last 30 days</span>
            <i data-lucide="chevron-down" aria-hidden="true"></i>
          </button>
          <a href="#" class="chart__report-link">
            <span>Revenue Report</span>
            <i data-lucide="arrow-right" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <!-- 3 · Bar Chart -->
      <div class="chart">
        <div class="chart__head">
          <div class="chart__title">
            <p class="chart__big">128 / 92</p>
            <p class="chart__sub">Organic vs Social signups</p>
          </div>
        </div>
        <div class="chart__canvas"><canvas id="bar-chart"></canvas></div>
        <div class="chart__foot">
          <button type="button" class="chart__filter">
            <span>Last 6 months</span>
            <i data-lucide="chevron-down" aria-hidden="true"></i>
          </button>
          <a href="#" class="chart__report-link">
            <span>Channel Report</span>
            <i data-lucide="arrow-right" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <!-- 4 · Doughnut -->
      <div class="chart">
        <div class="chart__head">
          <div class="chart__title">
            <p class="chart__big">88,400</p>
            <p class="chart__sub">Sessions by device</p>
          </div>
        </div>
        <div class="chart__canvas"><canvas id="doughnut"></canvas></div>
        <div class="chart__foot">
          <button type="button" class="chart__filter">
            <span>Last 7 days</span>
            <i data-lucide="chevron-down" aria-hidden="true"></i>
          </button>
          <a href="#" class="chart__report-link">
            <span>Devices Report</span>
            <i data-lucide="arrow-right" aria-hidden="true"></i>
          </a>
        </div>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    lucide.createIcons();

    const cs = getComputedStyle(document.documentElement);
    const tok = (n, fb) => (cs.getPropertyValue(n).trim() || fb);
    const brand = tok('--ai-surface-brand', '#0071d8');
    const success = tok('--ai-surface-success', '#30cb90');
    const contrast = tok('--ai-surface-brand-soft', '#bfd1ff');
    const text = tok('--ai-text-contrast', '#67676c');
    const grid = tok('--ai-border-secondary', '#e2e2e3');

    Chart.defaults.font.family = 'Inter, sans-serif';
    Chart.defaults.font.size = 12;
    Chart.defaults.color = text;
    Chart.defaults.borderColor = grid;

    function gradientFill(color) {
      return (ctx) => {
        const chart = ctx.chart;
        const { ctx: c, chartArea } = chart;
        if (!chartArea) return color;
        const g = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
        g.addColorStop(0, color + 'aa');
        g.addColorStop(1, color + '00');
        return g;
      };
    }

    const sharedScales = {
      x: { grid: { display: false }, border: { display: false } },
      y: { grid: { color: grid, drawBorder: false, borderDash: [4, 4] }, border: { display: false } },
    };
    const sharedPlugins = {
      legend: { display: false },
      tooltip: { backgroundColor: '#212123', titleFont: { weight: '600' }, padding: 10, cornerRadius: 6 },
    };

    new Chart(document.getElementById('multi-line'), {
      type: 'line',
      data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [
          { label: 'Clicks', data: [3000, 4200, 3800, 5100, 4900, 6100, 5800],
            borderColor: brand, backgroundColor: brand, tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 5 },
          { label: 'CPC', data: [1800, 2400, 2200, 2900, 2800, 3300, 3100],
            borderColor: success, backgroundColor: success, tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 5 },
        ],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: sharedPlugins, scales: sharedScales },
    });

    new Chart(document.getElementById('single-line'), {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'],
        datasets: [{
          label: 'Revenue', data: [6500, 6200, 7400, 8800, 9100, 10200, 11400, 12840],
          borderColor: brand, backgroundColor: gradientFill(brand),
          tension: 0.4, borderWidth: 3, fill: true, pointRadius: 0, pointHoverRadius: 5,
        }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: sharedPlugins, scales: sharedScales },
    });

    new Chart(document.getElementById('bar-chart'), {
      type: 'bar',
      data: {
        labels: ['Nov','Dec','Jan','Feb','Mar','Apr'],
        datasets: [
          { label: 'Organic', data: [44, 55, 41, 67, 22, 43], backgroundColor: brand, borderRadius: 4, borderSkipped: false },
          { label: 'Social', data: [13, 23, 20, 8, 13, 27], backgroundColor: success, borderRadius: 4, borderSkipped: false },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { ...sharedPlugins, legend: { display: true, position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 12 } } },
        scales: sharedScales,
      },
    });

    new Chart(document.getElementById('doughnut'), {
      type: 'doughnut',
      data: {
        labels: ['Desktop','Mobile','Tablet','Email'],
        datasets: [{
          data: [44, 28, 18, 10],
          backgroundColor: [brand, success, '#75A5FF', contrast],
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: {
          legend: { display: true, position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 12 } },
          tooltip: sharedPlugins.tooltip,
        },
      },
    });
  </script>
</body>
</html>
