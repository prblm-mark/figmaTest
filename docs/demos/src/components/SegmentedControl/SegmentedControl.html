<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../dark-mode-toggle.js"></script>
  <title>SegmentedControl — Component Demo</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="SegmentedControl.css">
  <style>
    body {
      padding: var(--ai-spacing-7);
      display: flex;
      flex-direction: column;
      gap: var(--ai-spacing-7);
      background-color: var(--ai-surface-secondary);
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      gap: var(--ai-spacing-5);
      padding: var(--ai-spacing-6);
      background-color: var(--ai-surface-primary);
      border-radius: var(--ai-radius-lg);
    }
    .demo-section h2 {
      font-family: var(--ai-font-title);
      font-weight: var(--ai-font-bold);
      font-size: var(--ai-font-fixed-sm);
      color: var(--ai-text-primary);
      margin: 0;
    }
    .demo-row {
      display: flex;
      align-items: center;
      gap: var(--ai-spacing-6);
    }
    .demo-label {
      font-size: var(--ai-font-fixed-xxs);
      color: var(--ai-text-contrast);
      min-width: 80px;
    }
  </style>
</head>
<body data-surface="chat">

  <div class="demo-section">
    <h2>SegmentedControl — Theme Toggle</h2>
    <div class="demo-row">
      <span class="demo-label">Light active</span>
      <div class="seg-control" role="radiogroup" aria-label="Theme" style="width: 172px;">
        <button class="seg-control__btn seg-control__btn--active" type="button" role="radio" aria-checked="true">
          <i data-lucide="sun" aria-hidden="true"></i>
          Light
        </button>
        <button class="seg-control__btn" type="button" role="radio" aria-checked="false">
          <i data-lucide="moon" aria-hidden="true"></i>
          Dark
        </button>
      </div>
    </div>
    <div class="demo-row">
      <span class="demo-label">Dark active</span>
      <div class="seg-control" role="radiogroup" aria-label="Theme" style="width: 172px;">
        <button class="seg-control__btn" type="button" role="radio" aria-checked="false">
          <i data-lucide="sun" aria-hidden="true"></i>
          Light
        </button>
        <button class="seg-control__btn seg-control__btn--active" type="button" role="radio" aria-checked="true">
          <i data-lucide="moon" aria-hidden="true"></i>
          Dark
        </button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Interactive</h2>
    <div class="demo-row">
      <div class="seg-control" role="radiogroup" aria-label="Theme" style="width: 172px;" id="demo-seg">
        <button class="seg-control__btn seg-control__btn--active" type="button" role="radio" aria-checked="true">
          <i data-lucide="sun" aria-hidden="true"></i>
          Light
        </button>
        <button class="seg-control__btn" type="button" role="radio" aria-checked="false">
          <i data-lucide="moon" aria-hidden="true"></i>
          Dark
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script>
    document.querySelectorAll('.seg-control').forEach(function (group) {
      group.addEventListener('click', function (e) {
        var btn = e.target.closest('.seg-control__btn');
        if (!btn || btn.classList.contains('seg-control__btn--active')) return;
        group.querySelectorAll('.seg-control__btn').forEach(function (b) {
          b.classList.remove('seg-control__btn--active');
          b.setAttribute('aria-checked', 'false');
        });
        btn.classList.add('seg-control__btn--active');
        btn.setAttribute('aria-checked', 'true');
      });
    });
  </script>

</body>
</html>
