<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="../dark-mode-toggle.js"></script>
  <title>Toggle — Component Demo</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="Toggle.css">
  <style>
    body {
      padding: var(--ai-spacing-7);
      display: flex;
      flex-direction: column;
      gap: var(--ai-spacing-7);
      background-color: var(--ai-surface-secondary);
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      gap: var(--ai-spacing-5);
      padding: var(--ai-spacing-6);
      background-color: var(--ai-surface-primary);
      border-radius: var(--ai-radius-lg);
    }
    .demo-section h2 {
      font-family: var(--ai-font-title);
      font-weight: var(--ai-font-bold);
      font-size: var(--ai-font-fixed-sm);
      color: var(--ai-text-primary);
      margin: 0;
    }
    .demo-row {
      display: flex;
      align-items: center;
      gap: var(--ai-spacing-6);
    }
    .demo-label {
      font-size: var(--ai-font-fixed-xxs);
      color: var(--ai-text-contrast);
      min-width: 80px;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Toggle — SM (no label)</h2>
    <div class="demo-row">
      <span class="demo-label">Initial</span>
      <button class="toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle">
        <span class="toggle__track"><span class="toggle__knob"></span></span>
      </button>
    </div>
    <div class="demo-row">
      <span class="demo-label">Active</span>
      <button class="toggle toggle--active" type="button" role="switch" aria-checked="true" aria-label="Toggle">
        <span class="toggle__track"><span class="toggle__knob"></span></span>
      </button>
    </div>
    <div class="demo-row">
      <span class="demo-label">Disabled</span>
      <button class="toggle toggle--disabled" type="button" role="switch" aria-checked="false" aria-disabled="true" aria-label="Toggle">
        <span class="toggle__track"><span class="toggle__knob"></span></span>
      </button>
    </div>
  </div>

  <div class="demo-section">
    <h2>Toggle — SM (with label)</h2>
    <div class="demo-row">
      <button class="toggle" type="button" role="switch" aria-checked="false">
        <span class="toggle__track"><span class="toggle__knob"></span></span>
        <span class="toggle__label">
          <span class="toggle__label-text">Show Borders</span>
          <span class="toggle__helper">Some helper text here</span>
        </span>
      </button>
    </div>
    <div class="demo-row">
      <button class="toggle toggle--active" type="button" role="switch" aria-checked="true">
        <span class="toggle__track"><span class="toggle__knob"></span></span>
        <span class="toggle__label">
          <span class="toggle__label-text">Show Borders</span>
          <span class="toggle__helper">Some helper text here</span>
        </span>
      </button>
    </div>
    <div class="demo-row">
      <button class="toggle toggle--disabled" type="button" role="switch" aria-checked="false" aria-disabled="true">
        <span class="toggle__track"><span class="toggle__knob"></span></span>
        <span class="toggle__label">
          <span class="toggle__label-text">Show Borders</span>
          <span class="toggle__helper">Some helper text here</span>
        </span>
      </button>
    </div>
  </div>

  <div class="demo-section">
    <h2>Interactive Toggle</h2>
    <div class="demo-row">
      <button class="toggle toggle--active" type="button" role="switch" aria-checked="true" id="demo-toggle">
        <span class="toggle__track"><span class="toggle__knob"></span></span>
        <span class="toggle__label">
          <span class="toggle__label-text">Click to toggle</span>
        </span>
      </button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.toggle:not(.toggle--disabled)').forEach(function (toggle) {
      toggle.addEventListener('click', function () {
        var isActive = toggle.classList.toggle('toggle--active');
        toggle.setAttribute('aria-checked', String(isActive));
      });
    });
  </script>

</body>
</html>
